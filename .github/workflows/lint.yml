name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
          additional_files: "setup.sh mcp-scan.30m.sh"
          severity: warning

  python-syntax:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check embedded Python in mcp-scan.30m.sh
        run: |
          python3 << 'PYCHECK'
          import re, ast, sys

          errors = []
          for filename in ["mcp-scan.30m.sh", "setup.sh"]:
              with open(filename) as f:
                  content = f.read()
              # Find all heredoc Python blocks
              for match in re.finditer(r"python3 (?:-c \")?(.*?)(?:\"|\n'PYEOF')", content, re.DOTALL):
                  pass  # inline -c blocks are short, skip
              # Check PYEOF heredoc blocks
              for match in re.finditer(r"python3 << 'PYEOF'\n(.*?)\nPYEOF", content, re.DOTALL):
                  code = match.group(1).replace("\\$", "$")
                  try:
                      ast.parse(code)
                      print(f"{filename} PYEOF block: OK")
                  except SyntaxError as e:
                      errors.append(f"{filename}: {e}")
                      print(f"{filename} syntax error: {e}")

          if errors:
              sys.exit(1)
          PYCHECK
